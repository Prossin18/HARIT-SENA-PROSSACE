<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Harit Sena Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Back Button -->
<a href="index.html" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<!-- Login Section -->
<section id="outer-box">

    <div class="container">
        <div class="row justify-content-center align-items-center">

            <div class="col-lg-8">
                <div class="card shadow-lg" style="border-radius: 1rem;">
                    <div class="row g-0">

                        <!-- Image -->
                        <div class="col-md-5 d-none d-md-block">
                            <img src="img/login.png"
                                class="img-fluid h-100"
                                style="border-radius: 1rem 0 0 1rem;" />
                        </div>

                        <!-- Form -->
                        <div class="col-md-7 d-flex align-items-center">
                            <div class="card-body p-4">

                                <div class="d-flex align-items-center mb-3">
                                    <i class="bi bi-leaf text-success me-2" style="font-size: 2rem;"></i>
                                    <span class="h3 fw-bold mb-0">Harit Sena</span>
                                </div>

                                <h6 class="mb-3">Login into your account</h6>

                                <!-- form start -->
                                <form method="POST" action="#">
                                        <input type="text" class="form-control mb-3" placeholder="Username" name="username" required>
                                        <input type="password" class="form-control mb-3" placeholder="Password" name = "password" required>

                                        <button class="btn btn-success w-100 mb-3" type="submit">Login</button>
                                </form>
                                <!-- form end -->

                                <div>
                                    <a href="#" class="small text-muted">Forgot password?</a><br>
                                    <span>Don't have an account? <a href="register.html">Register</a></span>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

</section>

</body>
</html>
